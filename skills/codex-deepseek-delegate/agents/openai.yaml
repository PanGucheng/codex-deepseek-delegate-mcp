interface:
  display_name: "Codex DeepSeek Delegate"
  short_description: "Delegate Codex tasks to DeepSeek MCP"
  default_prompt: "Use $codex-deepseek-delegate to delegate a complex code task through the DeepSeek MCP."

dependencies:
  tools:
    - type: "mcp"
      value: "deepseek_delegate"
      description: "Local MCP server exposing delegate_task, delegate_status, delegate_history, and delegate_execute."

policy:
  allow_implicit_invocation: true
